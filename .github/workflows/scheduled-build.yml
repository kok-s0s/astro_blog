name: Deploy GitHub Pages

on:
  push:
    branches: [main]
  schedule:
    - cron: '0 2 * * *' # 每天 UTC 02:00（北京时间 10:00）发布
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Configure Pages URL
        shell: bash
        run: |
          repo_name="${GITHUB_REPOSITORY#*/}"
          echo "SITE=https://${GITHUB_REPOSITORY_OWNER}.github.io" >> "$GITHUB_ENV"
          if [ "$repo_name" = "${GITHUB_REPOSITORY_OWNER}.github.io" ]; then
            echo "BASE_PATH=" >> "$GITHUB_ENV"
          else
            echo "BASE_PATH=/$repo_name" >> "$GITHUB_ENV"
          fi

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
